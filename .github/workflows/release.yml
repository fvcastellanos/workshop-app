name: Release

on:
  workflow_dispatch:
    inputs:
      VERSION_STRATEGY:
        description: 'Version strategy (Major, Minor, default: Minor)'
        required: false
        default: 'Minor'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout develop branch
        uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git user
        run: |
          git config user.email "ci-bot@github.com"
          git config user.name "CI Bot"

      - name: Get current version from pom.xml
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "pom_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Calculate release and next development version
        id: calc_versions
        run: |
          POM_VERSION="${{ steps.get_version.outputs.pom_version }}"
          RELEASE_VERSION="${POM_VERSION/-SNAPSHOT/}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$RELEASE_VERSION"
          STRATEGY="${{ github.event.inputs.VERSION_STRATEGY }}"
          if [ -z "$STRATEGY" ]; then STRATEGY="Minor"; fi
          case "$STRATEGY" in
            Major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              ;;
            Minor)
              MINOR=$((MINOR + 1))
              ;;
            Keep)
              ;;
            *)
              echo "Unknown VERSION_STRATEGY: $STRATEGY"
              exit 1
              ;;
          esac
          NEXT_DEV_VERSION="${MAJOR}.${MINOR}-SNAPSHOT"
          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "next_dev_version=$NEXT_DEV_VERSION" >> $GITHUB_OUTPUT

      # - name: Create release branch and set release version
