      #     git checkout main
      #     git merge release/${{ steps.calc_versions.outputs.release_version }}
      #     git push origin main
      #     git tag v${{ steps.calc_versions.outputs.release_version }}
      #     git push origin v${{ steps.calc_versions.outputs.release_version }}
