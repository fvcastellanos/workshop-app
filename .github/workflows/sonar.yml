name: SonarQube Scan

on:
  pull_request:
    branches:
      - develop
    types:
      - opened
      - synchronize
      - reopened

jobs:
  build:
    name: Static Code Analyze
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: workshop
          POSTGRES_DB: workshop
          POSTGRES_PASSWORD: test

        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Wait for Postgres to be ready
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 -U workshop && break
            sleep 2
          done

      - name: Create custom schema
        run: |
          PGPASSWORD=test psql -h localhost -U workshop -d workshop -c "CREATE SCHEMA IF NOT EXISTS workshop;"
          PGPASSWORD=test psql -h localhost -U workshop -d workshop -c "ALTER SCHEMA workshop OWNER TO workshop;"          
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          DATASOURCE_URL: ${{ secrets.DATASOURCE_URL }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_ISSUER: ${{ secrets.AUTH0_ISSUER }}
          WORKSHOP_CORS_ORIGINS: ${{ secrets.WORKSHOP_CORS_ORIGINS }}
          
        run: mvn -B clean test verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=workshop-app -Dsonar.projectName='Workshop Application'
